services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verify
      POSTGRES_PASSWORD: verify
      POSTGRES_DB: verifynews
    ports:
      - '5432:5432'
    volumes:
      - verifynews_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U verify -d verifynews']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://verify:verify@db:5432/verifynews
      PORT: '3001'
      WORKER_ENABLED: 'true'
      FEED_POLL_INTERVAL_MS: '900000'
      CORS_ORIGIN: http://localhost:8080,http://localhost:5173,http://localhost
      STACK_PROJECT_ID: ${STACK_PROJECT_ID:-}
      AUTH_TRUST_HEADER: ${AUTH_TRUST_HEADER:-true}
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  verifynews_pg: